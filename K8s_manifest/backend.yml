kind: Deployment
apiVersion: apps/v1

metadata:
    name: backend-deployment
    namespace: test-app-jenkins-ns

spec:
  replicas: 3
  selector:
    matchLabels:      # Fixed: capital L
      app: backend-app
  template:
    metadata:
      name: backend-pod
      labels:           # Fixed: changed from 'label' to 'labels'
        app: backend-app
    spec:
      containers:
        - name: backend-container
          image: heyydhiraj/notes_app_backend:v2.0
          ports:
            - containerPort: 5000
---
kind: Service
apiVersion: v1

metadata:
  name: backend-svc
  namespace: test-app-jenkins-ns

spec:
  type: NodePort      # Fixed: lowercase 't'
  selector:
    app: backend-app
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      nodePort: 30500
