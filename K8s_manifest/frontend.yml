kind: Deployment
apiVersion: apps/v1

metadata:
  name: frontend-deployment    # Fixed typo: deploymnet → deployment
  namespace: test-app-jenkins-ns

spec:
  replicas: 3
  selector:
    matchLabels:               # Fixed: capital L
      app: frontend-app
  template:
    metadata:
      name: frontend-pod
      namespace: test-app-jenkins-ns
      labels:                  # Fixed: changed from 'label' to 'labels'
        app: frontend-app
    spec:
      containers:
        - name: frontend-container
          image: heyydhiraj/notes_app_frontend:v3.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
kind: Service
apiVersion: v1

metadata:
  name: frontend-svc
  namespace: test-app-jenkins-ns

spec:
  type: NodePort
  selector:
    app: frontend-app
  ports:
    - port: 3000              # Fixed: changed 'ports' to 'port'
      targetPort: 3000
      protocol: TCP
      nodePort: 30600
