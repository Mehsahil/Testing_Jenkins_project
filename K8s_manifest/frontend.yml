kind: Deployment
apiVersion : apps/v1

metadata:
  name: frontend-deploymnet
  namespace: test-app-jenkins-ns

spec:
  replicas: 3
  selector:
    matchlabels:
      app : frontend-app
  template:
    metadata :
      name: frontend-pod
      namespace: test-app-jenkins-ns
      label:
        app : frontend-app
    spec:
      containers:
        - name: frontend-container
          image: heyydhiraj/notes_app_frontend:v2.0
          ports:
            - containerPort: 3000

---
kind: Service
apiVersion : v1

metadata:
  name: frontend-svc
  namespace: test-app-jenkins-ns

spec:
  type: NodePort
  selector:
    app: frontend-app
  ports:
    - ports: 3000
      targetPort: 3000
      protocol: TCP
      nodePort: 34000
    
